server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Static assets: long cache
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Astro directory-format routes (e.g. /docs/ -> /docs/index.html)
    location / {
        try_files $uri $uri/ $uri.html =404;
    }
}
