name: Release

# Push a version tag (e.g. `v0.1.1`) to build, sign, and publish a release
# with updater artifacts + latest.json. The tag should match the version in
# src-tauri/tauri.conf.json.
on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - run: bun install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: "Emberyx ${{ github.ref_name }}"
          releaseBody: "Download the .dmg to install. Existing installs update in-app."
          releaseDraft: false
          prerelease: false
          args: --target universal-apple-darwin

      # The updater runs anonymously, so its files must live on a PUBLIC repo
      # (this source repo is private → anonymous downloads 404). Mirror the
      # signed update payload + a URL-rewritten latest.json to emberyx-releases.
      # Needs a PAT with contents:write on the mirror repo (GITHUB_TOKEN is
      # scoped to this repo only).
      - name: Mirror updater artifacts to public releases repo
        env:
          TAG: ${{ github.ref_name }}
          SRC_REPO: ${{ github.repository }}
          MIRROR_REPO: JiriMachynka/emberyx-releases
          SRC_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MIRROR_TOKEN: ${{ secrets.RELEASES_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p mirror
          # Grab what tauri-action just published to the private release: the
          # updater payload (+sig), latest.json, and the .dmg so the public repo
          # can also serve fresh installs.
          GH_TOKEN="$SRC_TOKEN" gh release download "$TAG" --repo "$SRC_REPO" \
            --pattern "Emberyx_universal.app.tar.gz*" \
            --pattern "*.dmg" \
            --pattern "latest.json" --dir mirror
          # Repoint the update payload URLs at the public mirror.
          sed -i.bak "s#/emberyx/releases/download/#/emberyx-releases/releases/download/#g" mirror/latest.json
          rm -f mirror/latest.json.bak
          # Publish to the public mirror (create the release once, then upload).
          export GH_TOKEN="$MIRROR_TOKEN"
          gh release view "$TAG" --repo "$MIRROR_REPO" >/dev/null 2>&1 || \
            gh release create "$TAG" --repo "$MIRROR_REPO" \
              --title "Emberyx $TAG" \
              --notes "Auto-update channel for Emberyx. Install the app from the private repo's release."
          gh release upload "$TAG" --repo "$MIRROR_REPO" --clobber \
            mirror/Emberyx_universal.app.tar.gz \
            mirror/Emberyx_universal.app.tar.gz.sig \
            mirror/latest.json \
            mirror/*.dmg
