name: Release

# Push a version tag (e.g. `v0.1.1`) to build, sign, and publish a release
# with updater artifacts + latest.json. The tag should match the version in
# src-tauri/tauri.conf.json.
on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Gate the build on the same checks CI runs on main — a red commit must never
  # ship a .dmg. Uses the `test` cache key so it never thrashes the `release`
  # cache the build job restores.
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri
          shared-key: test

      - run: bun install --frozen-lockfile

      - name: Typecheck
        run: bunx tsc --noEmit
        working-directory: apps/desktop

      - name: Frontend tests
        run: bun run test
        working-directory: apps/desktop

      - name: Clippy
        run: cargo clippy --all-targets
        working-directory: apps/desktop/src-tauri

      - name: Rust tests
        run: cargo test
        working-directory: apps/desktop/src-tauri

  release:
    needs: test
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri
          # Matches warm-cache.yml so tag runs restore the main-branch cache
          # instead of compiling every dependency from scratch.
          shared-key: release

      - run: bun install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: "Emberyx ${{ github.ref_name }}"
          releaseBody: "Download the .dmg to install. Existing installs update in-app."
          releaseDraft: false
          prerelease: false
          args: --target aarch64-apple-darwin
